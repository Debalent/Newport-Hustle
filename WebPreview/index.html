<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newport Hustle – UI Redesign</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Global Audio Controls -->
    <div class="audio-controls">
      <button id="mute-btn" class="audio-btn" aria-label="Mute Audio">
        <!-- SVG will be injected by JS -->
      </button>
    </div>

    <!-- Splash Screen -->
    <section class="screen screen--active" id="screen-splash">
      <div class="screen__content screen__content--center">
        <h1 class="logo">Newport Hustle</h1>
        <p class="tagline">HustleOS™ v4.20 Starting...</p>
        <button class="btn btn--primary" data-target="screen-main-menu">Tap to Begin</button>
      </div>
    </section>

    <!-- Main Menu -->
    <section class="screen" id="screen-main-menu">
      <div class="screen__content screen__content--center">
        <h1 class="logo">Newport Hustle</h1>
        <button class="btn btn--primary" data-target="screen-missions">Continue</button>
        <button class="btn" data-target="screen-missions">New Game</button>
        <button class="btn" data-target="screen-settings">Settings</button>
      </div>
    </section>

    <!-- Mission Select -->
    <section class="screen" id="screen-missions">
      <header class="top-bar">
        <button class="top-bar__back" data-target="screen-main-menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z"></path></svg>
        </button>
        <h2 class="top-bar__title">Missions</h2>
      </header>
      <div class="screen__content">
        <ul class="list" id="mission-list">
          <!-- Populated by app.js -->
        </ul>
      </div>
      <footer class="screen__footer">
        <button class="btn btn--primary" data-target="screen-hud">Start Hustlin'</button>
      </footer>
    </section>

    <!-- Settings -->
    <section class="screen" id="screen-settings">
      <header class="top-bar">
        <button class="top-bar__back" data-target="screen-main-menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z"></path></svg>
        </button>
        <h2 class="top-bar__title">Settings</h2>
      </header>
      <div class="screen__content">
        <div class="setting-row">
          <label for="vol-master">Master Volume</label>
          <input id="vol-master" type="range" min="0" max="100" value="80" title="Master Volume" />
        </div>
        <div class="setting-row">
          <label for="vol-music">Music Volume</label>
          <input id="vol-music" type="range" min="0" max="100" value="70" title="Music Volume" />
        </div>
        <div class="setting-row">
          <label for="vol-sfx">SFX Volume</label>
          <input id="vol-sfx" type="range" min="0" max="100" value="90" title="SFX Volume" />
        </div>
      </div>
    </section>

    <!-- HUD Preview -->
    <section class="screen" id="screen-hud">
      <div class="hud-bar hud-bar--top">
        <div class="hud-stat">
          <span class="hud-stat__value" id="hud-money">$325</span>
        </div>
        <div class="wanted-stars" aria-label="Heat Level">
          <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
        </div>
        <div class="hud-stat">
          <span class="hud-stat__value" id="hud-respect">Respect: 10</span>
        </div>
      </div>

      <div class="hud-bar hud-bar--bottom">
        <div class="hud-actions">
          <button class="hud-btn" data-target="screen-map" aria-label="Open Map">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20.8242C12 20.8242 19.5 16.3242 19.5 10.3242C19.5 6.32422 16.125 3.32422 12 3.32422C7.875 3.32422 4.5 6.32422 4.5 10.3242C4.5 16.3242 12 20.8242 12 20.8242ZM12 12.8242C13.3807 12.8242 14.5 11.7049 14.5 10.3242C14.5 8.94355 13.3807 7.82422 12 7.82422C10.6193 7.82422 9.5 8.94355 9.5 10.3242C9.5 11.7049 10.6193 12.8242 12 12.8242Z"></path></svg>
          </button>
        </div>
        <div class="hud-actions">
          <button class="hud-btn" data-target="screen-pause" aria-label="Pause">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5H8V19H6V5ZM16 5H18V19H16V5Z"></path></svg>
          </button>
        </div>
      </div>
    </section>
    
    <!-- Other screens remain the same for now -->

  </div>

  <audio id="bg-music" loop src="../NewportHustleGame/Assets/Audio/Music/And we outside.wav"></audio>
  <audio id="sfx-click" src="path/to/your/click.wav"></audio>
  <audio id="sfx-whoosh" src="path/to/your/whoosh.wav"></audio>

  <script>
    // Embedded mission data (mirrors Config/MissionData.json main_story_missions)
    window.NH_MISSIONS = {
      main_story_missions: [
        {
          missionID: "mission_01_welcome_back",
          title: "Welcome Back to Newport",
          description: "Return to Newport, Arkansas and reacquaint yourself with the town and its people.",
          objectives: [
            "Explore downtown Newport",
            "Meet with your old mentor",
            "Visit the White River waterfront",
            "Find a place to stay"
          ]
        },
        {
          missionID: "mission_02_the_cut",
          title: "The Cut",
          description: "Prove yourself in Newport's barbershop scene by earning the respect of the community.",
          objectives: [
            "Visit Barber's Row on Main Street",
            "Meet the head barber",
            "Complete 3 test haircuts",
            "Earn $50 in tips"
          ]
        },
        {
          missionID: "mission_03_spa_secrets",
          title: "Spa Secrets",
          description: "Navigate the modern wellness industry while uncovering secrets in Newport's spa district.",
          objectives: [
            "Explore the spa district",
            "Meet the spa owner",
            "Discover the truth about spa finances",
            "Decide whether to help or expose the spa"
          ]
        },
        {
          missionID: "mission_04_riverfront_reckoning",
          title: "Riverfront Reckoning",
          description: "Climactic confrontation by the White River that shapes Newport's future.",
          objectives: [
            "Uncover the truth about your family's Newport legacy",
            "Face the consequences of family history",
            "Bring together different factions of Newport",
            "Decide your role in Newport's future"
          ]
        }
      ]
    };
  </script>
  <script src="app.js"></script>
</body>
</html>
